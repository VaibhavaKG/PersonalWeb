<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gallery | Vaibhava Addagal</title>
    <link rel="icon" type="image/x-icon" href="data:image/x-icon;base64," />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css" />

    <!-- Custom Styles -->
    <style>
      :root {
        --bg-primary: #0a0a0a;
        --border-color: #262626;
        --primary-color: #ffffff;
      }
      body {
        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          sans-serif;
        margin: 0;
        padding: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      .backdrop-blur-sm {
        backdrop-filter: blur(8px);
      }
      .bg-image-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
        background-image: url("assets/Gallery/BuzzAldrinOnTheMoon.jpg");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
      }
      .content-wrapper {
        flex: 1;
        display: flex;
        flex-direction: column;
      }
      footer {
        margin-top: auto;
      }
    </style>
  </head>
  <body class="text-[var(--primary-color)]">
    <!-- Background Image -->
    <div class="bg-image-container"></div>

    <div data-site-header></div>

    <!-- Content Wrapper -->
    <div class="content-wrapper">
      <!-- Main Content -->
      <main
        class="flex-1 flex flex-col justify-center items-center text-center px-6 py-20"
      >
        <div class="bg-black/50 backdrop-blur-sm px-8 py-12 rounded-2xl">
          <h1 class="text-4xl md:text-5xl font-bold mb-4">Gallery</h1>
          <p class="text-lg text-gray-300">
            Gallery section is under development 🎨🚧
          </p>
          <a
            href="index.html"
            class="mt-8 inline-block bg-white/10 hover:bg-white/20 text-white px-5 py-2 rounded-full transition"
          >
            ← Back to Home
          </a>
        </div>
      </main>

      <!-- Footer -->
      <footer
        class="relative z-10 bg-black/70 backdrop-blur-sm border-t border-gray-800/50 py-4"
      >
        <div class="max-w-6xl mx-auto px-6 text-center">
          <a
            href="https://www.flickr.com/photos/nasacommons/42604134635/in/album-72157634974031758"
            target="_blank"
            rel="noopener noreferrer"
            class="text-sm text-gray-400 hover:text-white transition-colors inline-flex items-center gap-2"
          >
            <span>Image Credits: NASA</span>
            <svg
              class="w-4 h-4"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"
              ></path>
            </svg>
          </a>
        </div>
      </footer>
    </div>

    <div class="loader-container">
      <div class="planet" id="mercury"></div>
      <div class="planet" id="venus"></div>
      <div class="planet" id="earth"></div>
      <div class="planet" id="mars"></div>
      <div class="planet" id="jupiter"></div>
      <div class="planet" id="saturn"></div>
      <div class="planet" id="uranus"></div>
      <div class="planet" id="neptune"></div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
